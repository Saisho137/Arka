server:
  port: ${MS_PROVIDER_PORT:8089}

spring:
  application:
    name: ms-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  r2dbc:
    url: r2dbc:postgresql://${R2DBC_HOST:localhost}:${R2DBC_PORT:5437}/${R2DBC_DB:db_provider}
    username: ${R2DBC_USER:arka}
    password: ${R2DBC_PASSWORD:arkaSecret2025}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: provider-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false

scheduler:
  outbox-relay:
    interval: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.arka: INFO
    org.springframework.r2dbc: WARN
    io.r2dbc: WARN
