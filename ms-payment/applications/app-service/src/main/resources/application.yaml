server:
  port: "${MS_PAYMENT_PORT:8083}"

spring:
  application:
    name: ms-payment
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:db_payment}
    username: ${DB_USER:arka}
    password: ${DB_PASSWORD:arka}
    pool:
      initial-size: 5
      max-size: 20

kafka:
  consumer:
    group-id: payment-service-group
    topics:
      order-events: order-events
  producer:
    topics:
      payment-events: payment-events

scheduler:
  outbox-relay:
    interval: 5000
