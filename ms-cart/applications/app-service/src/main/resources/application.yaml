server:
  port: "${MS_CART_PORT:8086}"

spring:
  application:
    name: "ms-cart"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  data:
    mongodb:
      uri: "${MONGODB_URI:mongodb://localhost:27017/cart_db}"
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

cart:
  abandonment:
    check-interval: 300000
    threshold: 30m

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

grpc:
  client:
    ms-catalog:
      address: "static://${MS_CATALOG_GRPC_HOST:localhost}:${MS_CATALOG_GRPC_PORT:9091}"
      negotiation-type: plaintext
