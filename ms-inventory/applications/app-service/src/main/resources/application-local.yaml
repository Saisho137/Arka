# Perfil LOCAL — desarrollo desde IntelliJ sin Docker
# Solo sobreescribe los campos que difieren del application.yaml base.
# PostgreSQL corriendo en localhost (instalación local o solo el contenedor de DB).
spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/db_inventory
    username: postgres
    password: root
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.arka: DEBUG
