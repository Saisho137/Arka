server:
  port: "${MS_SHIPPING_PORT:8088}"

spring:
  application:
    name: "ms-shipping"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  r2dbc:
    url: "r2dbc:postgresql://${R2DBC_HOST:localhost}:${R2DBC_PORT:5436}/${R2DBC_DB:db_shipping}"
    username: "${R2DBC_USER:arka}"
    password: "${R2DBC_PASSWORD:arkaSecret2025}"
    pool:
      enabled: true
      initial-size: 5
      max-size: 20  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: shipping-service-group

scheduler:
  outbox-relay:
    interval: 5000

shipping:
  s3:
    bucket-name: arka-shipping-labels
  timeout:
    carrier-call: 30s

adapters:
  aws:
    s3:
      endpoint: ${AWS_ENDPOINT:http://localhost:4566}
      region: ${AWS_REGION:us-east-1}
      bucket-name: arka-shipping-labels

resilience4j:
  circuitbreaker:
    instances:
      dhl-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      fedex-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      legacy-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      dhl-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      fedex-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      legacy-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
  bulkhead:
    instances:
      dhl-carrier:
        max-concurrent-calls: 10
      fedex-carrier:
        max-concurrent-calls: 10
      legacy-carrier:
        max-concurrent-calls: 10

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    consumer:
      group-id: "shipping-service-group"
      auto-offset-reset: earliest
      enable-auto-commit: false

adapter:
  aws:
    s3:
      bucket-name: "arka-shipping-labels"
      region: "us-east-1"
      endpoint: "${AWS_ENDPOINT:https://s3.localhost.localstack.cloud:4566}"

aws:
  region: "us-east-1"
  endpoint: "${AWS_ENDPOINT:http://localhost:4566}"

shipping:
  carriers:
    dhl:
      api-key: "${DHL_API_KEY:test-dhl-key}"
      webhook-secret: "${DHL_WEBHOOK_SECRET:test-dhl-webhook-secret}"
    fedex:
      api-key: "${FEDEX_API_KEY:test-fedex-key}"
      webhook-secret: "${FEDEX_WEBHOOK_SECRET:test-fedex-webhook-secret}"
    legacy:
      api-key: "${LEGACY_API_KEY:test-legacy-key}"
      webhook-secret: "${LEGACY_WEBHOOK_SECRET:test-legacy-webhook-secret}"
  timeout:
    carrier-call: 30s

scheduler:
  outbox-relay:
    interval: 5000

resilience4j:
  circuitbreaker:
    instances:
      dhl-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      fedex-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      legacy-carrier:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      dhl-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      fedex-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      legacy-carrier:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
  bulkhead:
    instances:
      dhl-carrier:
        max-concurrent-calls: 10
      fedex-carrier:
        max-concurrent-calls: 10
      legacy-carrier:
        max-concurrent-calls: 10

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

logging:
  level:
    com.arka: INFO
    org.springframework.r2dbc: WARN
    io.r2dbc: WARN
