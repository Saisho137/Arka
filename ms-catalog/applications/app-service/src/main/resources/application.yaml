server:
  port: "${MS_CATALOG_PORT:8084}"
spring:
  application:
    name: "ms-catalog"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  data:
    mongodb:
      uri: "mongodb://${MONGO_USER:arka}:${MONGO_PASSWORD:arkaSecret2025}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/db_catalog?authSource=admin&replicaSet=rs0"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    consumer:
      group-id: "ms-catalog"
      auto-offset-reset: earliest
      enable-auto-commit: false
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

scheduler:
  outbox-relay:
    interval: 5000

logging:
  level:
    com.arka: INFO
    org.springframework.data.mongodb.core: WARN
    org.mongodb.driver: WARN
