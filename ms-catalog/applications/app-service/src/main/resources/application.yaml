server:
  port: "${MS_CATALOG_PORT:8084}"
spring:
  application:
    name: "ms-catalog"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  data:
    mongodb:
      uri: "mongodb://${MONGO_USER:arka}:${MONGO_PASSWORD:arkaSecret2025}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/db_catalog?authSource=admin&replicaSet=rs0"
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
