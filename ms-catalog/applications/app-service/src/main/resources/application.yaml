server:
  port: "${MS_CATALOG_PORT:8084}"
spring:
  application:
    name: "ms-catalog"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  data:
    mongodb:
      # replicaSet=rs0 requerido para que ReactiveMongoTransactionManager habilite
      # transacciones multi-documento (Outbox Pattern). El driver descubre el primary
      # automáticamente; sin este parámetro las transacciones fallan con
      # "Sessions are not supported by the MongoDB cluster to which this client is connected".
      uri: "mongodb://${MONGO_USER:arka}:${MONGO_PASSWORD:arkaSecret2025}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/db_catalog?authSource=admin&replicaSet=rs0"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
