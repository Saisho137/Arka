server:
  port: "${MS_CATALOG_PORT:8084}"

grpc:
  server:
    port: "${GRPC_CATALOG_PORT:9090}"

spring:
  application:
    name: "ms-catalog"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  mongodb:
    uri: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@arka-mongodb:27017/db_catalog?authSource=admin&replicaSet=rs0&uuidRepresentation=standard"
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: "ms-catalog"
      auto-offset-reset: earliest
      enable-auto-commit: false

scheduler:
  outbox-relay:
    interval: 5000

cache:
  redis:
    ttl: 3600 # 1 hour in seconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

logging:
  level:
    com.arka: DEBUG
    org.springframework.data.mongodb.core: DEBUG
    org.mongodb.driver: WARN
