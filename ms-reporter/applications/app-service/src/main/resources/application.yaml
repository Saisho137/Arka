server:
  port: "${MS_REPORTER_PORT:8087}"
spring:
  application:
    name: "ms-reporter"
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  datasource:
    url: "jdbc:postgresql://${JDBC_HOST:localhost}:${JDBC_PORT:5435}/${JDBC_DB:db_reporter}"
    username: "${JDBC_USER:arka}"
    password: "${JDBC_PASSWORD:arkaSecret2025}"
    driver-class-name: "org.postgresql.Driver"
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    consumer:
      group-id: "reporter-service-group"
      auto-offset-reset: "earliest"
      enable-auto-commit: false
      key-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      value-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
    producer:
      key-serializer: "org.apache.kafka.common.serialization.StringSerializer"
      value-serializer: "org.apache.kafka.common.serialization.StringSerializer"
      acks: "all"
      retries: 3
      properties:
        enable.idempotence: true
    listener:
      ack-mode: "manual_immediate"
aws:
  s3:
    bucket: "${S3_BUCKET:arka-reports}"
    region: "${AWS_REGION:us-east-1}"
    endpoint: "${AWS_ENDPOINT:http://localhost:4566}"
scheduler:
  stock-alert:
    cron: "${STOCK_ALERT_CRON:0 0 2 * * *}"
kafka:
  topics:
    product-events: "product-events"
    inventory-events: "inventory-events"
    order-events: "order-events"
    cart-events: "cart-events"
    payment-events: "payment-events"
    shipping-events: "shipping-events"
    provider-events: "provider-events"
    reporter-events: "reporter-events"
springdoc:
  api-docs:
    path: "/v3/api-docs"
  swagger-ui:
    path: "/swagger-ui.html"
    enabled: true
adapter:
  aws:
    s3:
      bucketName: "test"
      region: "us-east-1"
      endpoint: "https://s3.localhost.localstack.cloud:4566"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
